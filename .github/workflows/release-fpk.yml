name: Release FPK

on:
  push:
  workflow_dispatch:

# 避免 CI 回推 tag 时再次触发一轮构建
concurrency:
  group: release-fpk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.ref, 'refs/tags/') ||
      github.event.pusher.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build fpk
        run: bash scripts/build-fpk.sh

      - name: Release metadata
        id: meta
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="v${pkg}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "name=ktpWarp Server ${tag}" >> "$GITHUB_OUTPUT"
          echo "body=Build \`${GITHUB_SHA::7}\` from \`${GITHUB_REF_NAME}\`" >> "$GITHUB_OUTPUT"

      - name: Move version tag to this commit
        if: >-
          github.event_name == 'workflow_dispatch' ||
          !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ steps.meta.outputs.tag }}" -m "CI release ${{ github.sha }}"
          git push origin "${{ steps.meta.outputs.tag }}" --force

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.meta.outputs.body }}
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          makeLatest: true
          artifacts: ktpwarp-server.fpk,ktpwarp-server_all.fpk
